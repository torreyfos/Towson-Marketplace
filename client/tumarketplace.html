<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU Marketplace Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <img src="logo.png" alt="Towson University Logo" class="logo">

    <h1>TU Marketplace</h1>

    <form id="loginForm">
        <input type="text" id="tuId" placeholder="TU ID (7 digits)" required>
        <input type="email" id="email" placeholder="TU Email (@students.towson.edu)" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p id="error" class="error"></p>
</div>

<script src="app.js"></script>
</body>
</html>
